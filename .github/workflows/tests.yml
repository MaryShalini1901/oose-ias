name: Automated Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGO_URI: mongodb://localhost:27017/internship_awareness
      JWT_SECRET: ci-test-secret
      TEST_BASE_URL: http://localhost:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: |
          mkdir -p test-results
          set -o pipefail
          npm run test:api 2>&1 | tee test-results/api-tests.log

      - name: Run load tests
        run: |
          mkdir -p test-results
          set -o pipefail
          npm run test:load 2>&1 | tee test-results/load-tests.log

      - name: Upload API and load test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-load-test-logs
          path: test-results/*.log
          if-no-files-found: warn

  ui-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGO_URI: mongodb://localhost:27017/internship_awareness
      JWT_SECRET: ci-test-secret
      TEST_BASE_URL: http://localhost:5000
      UI_BASE_URL: http://localhost:5500
      UI_HEADLESS: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: |
          mkdir -p test-results
          set -o pipefail
          npm run test:ui 2>&1 | tee test-results/ui-tests.log

      - name: Upload UI test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-logs
          path: test-results/*.log
          if-no-files-found: warn

  notify-on-failure:
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - ui-tests
    if: ${{ always() && (needs.api-tests.result == 'failure' || needs.ui-tests.result == 'failure') }}

    steps:
      - name: Add workflow failure summary
        run: |
          echo "## Automated Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "- API job result: ${{ needs.api-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- UI job result: ${{ needs.ui-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Open artifacts section to download test logs." >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR when tests fail
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const body = [
              'Automated Tests failed for this PR.',
              `API job: ${{ needs.api-tests.result }}`,
              `UI job: ${{ needs.ui-tests.result }}`,
              `Run logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
